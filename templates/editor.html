{% extends "layout.html" %}

{% block content %}
<div class="editor-header">
    <h1>{{ date }}</h1>
    <div>
        <button id="toggle-view" style="margin-right: 15px; padding: 5px 10px; cursor: pointer; border: 1px solid var(--border-color); background: #fff; border-radius: 4px;">View</button>
        <span id="save-status">Saved</span>
    </div>
</div>

<textarea id="markdown-editor" data-date="{{ date }}" data-root="{{ root_url }}" placeholder="Write your thoughts here...">{{ markdown_body }}</textarea>
<div id="rendered-content" style="display: none; width: 100%; height: 100%; overflow-y: auto;">
    {{ html_content }}
</div>

<script>
    const editor = document.getElementById('markdown-editor');
    const renderedContent = document.getElementById('rendered-content');
    const toggleBtn = document.getElementById('toggle-view');
    const status = document.getElementById('save-status');
    const rootUrl = editor.getAttribute('data-root');
    const entryDate = editor.getAttribute('data-date');
    let timeoutId;
    let isEditing = true;

    toggleBtn.addEventListener('click', () => {
        isEditing = !isEditing;
        if (isEditing) {
            editor.style.display = 'block';
            renderedContent.style.display = 'none';
            toggleBtn.textContent = 'View';
            editor.focus();
        } else {
            editor.style.display = 'none';
            renderedContent.style.display = 'block';
            toggleBtn.textContent = 'Edit';
        }
    });

    function save() {
        status.textContent = 'Saving...';
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
            fetch(`${rootUrl}entry/${entryDate}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ body: editor.value })
            })
            .then(res => res.json())
            .then(data => {
                status.textContent = 'Saved';
                if (data.html) {
                    renderedContent.innerHTML = data.html;
                }
                if (data.slug) {
                    window.history.replaceState({}, '', `${rootUrl}entry/${data.slug}`);
                }
            })
            .catch(err => {
                status.textContent = 'Error saving';
            });
        }, 1000);
    }

    editor.addEventListener('input', save);

    editor.addEventListener('dragover', (e) => {
        e.preventDefault();
        editor.style.border = '2px dashed var(--link-color)';
    });

    editor.addEventListener('dragleave', (e) => {
        e.preventDefault();
        editor.style.border = 'none';
    });

    editor.addEventListener('drop', (e) => {
        e.preventDefault();
        editor.style.border = 'none';
        
        const files = e.dataTransfer.files;
        if (files.length === 0) return;
        
        const file = files[0];
        const formData = new FormData();
        formData.append('file', file);
        
        status.textContent = 'Uploading...';
        
        fetch(`${rootUrl}api/attachments`, {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            status.textContent = 'Uploaded';
            const cursorPosition = editor.selectionStart;
            const textToInsert = `\n![${file.name}](${data.url})\n`;
            editor.value = editor.value.substring(0, cursorPosition) + textToInsert + editor.value.substring(editor.selectionEnd);
            save();
        })
        .catch(err => {
            status.textContent = 'Upload failed';
        });
    });
</script>
{% endblock %}
