<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Journal</title>
    <link rel="stylesheet" href="{{root_url}}static/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2>Journal</h2>
            <nav>
                <ul>
                    <li><a href="{{root_url}}">Today</a></li>
                </ul>
                <h3>Past Entries</h3>
                <ul>
                    {% for e in past_entries %}
                    <li><a href="{{root_url}}entry/{{e.slug}}">{{e.date}}</a></li>
                    {% endfor %}
                </ul>
            </nav>
            <div class="logout">
                <form action="{{root_url}}auth/logout" method="POST">
                    <button type="submit">Logout</button>
                </form>
            </div>
        </aside>
        <main class="editor-container">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
