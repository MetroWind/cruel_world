{% extends "layout.html" %}

{% block content %}
<div class="attachments-container">
    <h1>Manage Attachments</h1>
    
    <div class="upload-section">
        <form action="{{root_url}}api/attachments" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload Attachment</button>
        </form>
    </div>

    <ul class="attachment-list">
        {% for a in attachments %}
        <li>
            <div class="attachment-info">
                <strong>{{ a.filename }}</strong> ({{ a.mime_type }})
                <br>
                <code>{{ root_url }}attachments/{{ a.slug }}</code>
            </div>
            <div class="attachment-actions">
                <button onclick="copyToClipboard('{{ root_url }}attachments/{{ a.slug }}')">Copy URL</button>
                <form action="{{root_url}}attachments/{{ a.slug }}/delete" method="POST" class="delete-form">
                    <button type="submit" class="delete-btn" onclick="return confirm('Are you sure you want to delete this attachment?');">Delete</button>
                </form>
            </div>
        </li>
        {% endfor %}
    </ul>
</div>

<script>
function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard!');
    });
}
</script>
{% endblock %}
