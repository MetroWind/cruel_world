{% extends "layout.html" %}

{% block content %}
<div class="auth-container">
    <h1>Unlock Your Cruel World</h1>
    <p>Please enter your passphrase to unlock your entries.</p>
    <form action="{{root_url}}auth/unlock" method="POST">
        <div class="form-group">
            <label for="passphrase">Cruel World Passphrase:</label>
            <input type="password" id="passphrase" name="passphrase" required autofocus>
        </div>
        {% if exists("error") %}
        <p class="error-message">{{ error }}</p>
        {% endif %}
        <button type="submit">Unlock</button>
    </form>
</div>
{% endblock %}
