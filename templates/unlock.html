{% extends "layout.html" %}

{% block content %}
<div class="auth-container">
    <h1>Unlock Your Journal</h1>
    <p>Please enter your journal passphrase to unlock your entries.</p>
    <form action="{{root_url}}auth/unlock" method="POST">
        <div class="form-group">
            <label for="passphrase">Journal Passphrase:</label>
            <input type="password" id="passphrase" name="passphrase" required autofocus>
        </div>
        {% if exists("error") %}
        <p style="color: red;">{{ error }}</p>
        {% endif %}
        <button type="submit">Unlock</button>
    </form>
</div>

<style>
.auth-container {
    max-width: 500px;
    margin: 100px auto;
    padding: 20px;
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 8px;
}
.form-group {
    margin-bottom: 15px;
}
.form-group label {
    display: block;
    margin-bottom: 5px;
}
.form-group input {
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
}
button {
    width: 100%;
    padding: 10px;
    background: #333;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
button:hover {
    background: #444;
}
</style>
{% endblock %}
